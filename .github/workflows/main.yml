name: Update Website

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch:      # Allows manual trigger from the "Actions" tab

env:
  # Opts into the newer Node environment to prevent deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Prevents multiple builds from overlapping if one is slow
    concurrency:
      group: news-update
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser google-genai

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Note: Added a timeout so the script doesn't run forever in the runner
        run: |
          timeout 280s python scraper.py || echo "Interval complete or timed out"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "Automated News Update: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
