name: Update News Portal

on:
  schedule:
    - cron: '0 * * * *' # Automatically updates every hour
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential to save index.html

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser google-generativeai

      - name: Run News Scraper and AI Rewriter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: python scraper.py

      - name: Commit and Push Updates
        run: |
          git config --global user.name "TheContinentBot"
          git config --global user.email "bot@thecontinentnews.com"
          
          # Stage the newly generated index.html
          git add index.html
          
          # Commit the changes (exit quietly if nothing changed)
          git commit -m "Automated News Refresh: $(date)" || exit 0
          
          # Use --force to ensure the update goes through despite conflicts
          git push origin main --force
