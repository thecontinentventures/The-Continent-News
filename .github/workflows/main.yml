name: Update News Portal
on:
  schedule:
    - cron: '0 * * * *' # Updates every hour
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install feedparser

      - name: Generate Site
        run: python scraper.py

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "NewsBot"
          git config --global user.email "bot@thecontinent.com"
          git add index.html
          git commit -m "Automated News Update" || exit 0
          git push
