name: Update News Portal

on:
  schedule:
    - cron: '0 * * * *' # Automatically updates every hour
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save index.html to your repo
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so rebase works smoothly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser google-generativeai

      - name: Run News Scraper and AI Rewriter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: python scraper.py

      - name: Commit and Push Updates
        run: |
          git config --global user.name "TheContinentBot"
          git config --global user.email "bot@thecontinentnews.com"
          
          # Pull latest changes from your edits to prevent the "rejected" error
          git pull --rebase origin main
          
          git add index.html
          # Ensures the workflow doesn't fail if the news content is identical to last hour
          git commit -m "Automated News Refresh: $(date)" || exit 0
          
          # Push the changes back to the main branch
          git push origin main
